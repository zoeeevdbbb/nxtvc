<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NXTVC — Hero Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  .pad { padding: 60px; display: inline-block; }
  .banner {
    position: relative; width: 1080px; box-sizing: border-box;
    background: radial-gradient(120% 130% at 50% 0%, #4a2e66 0%, #3A2350 68%);
    border-radius: 22px; overflow: hidden;
    padding: 92px 60px 96px; display: flex; flex-direction: column; align-items: center; gap: 30px;
  }
  .banner::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.13) 0 1px, transparent 1px 4px);
    mix-blend-mode: overlay;
  }
  .eyebrow {
    font-family: 'Press Start 2P', monospace; font-size: 15px; letter-spacing: 0.14em;
    color: #FF9F45; z-index: 1;
  }
  .wm {
    font-family: 'Press Start 2P', monospace; font-size: 92px; color: #FBEEDD;
    letter-spacing: 0.05em; padding-left: 0.05em; line-height: 1; z-index: 1;
    text-shadow: 4px 4px 0 #FF6B6B, 8px 8px 0 #9B6BFF;
  }
  .wm span { display: inline-block; }
  .tag {
    font-family: 'Press Start 2P', monospace; font-size: 16px; letter-spacing: 0.12em;
    color: #9B6BFF; z-index: 1;
  }
</style>
</head>
<body>
  <div class="pad">
    <div class="banner">
      <span class="eyebrow">◆ MULTIPLAYER ◆</span>
      <span class="wm" id="wm">NXTVC</span>
      <span class="tag">PRESS START TO JOIN</span>
    </div>
  </div>
  <script>
    (function () {
      var el = document.getElementById("wm");
      var t = el.textContent.trim();
      el.innerHTML = t.split("").map(function (ch, i) {
        var ml = i === 2 ? "-0.12em" : i === 3 ? "-0.01em" : i === 4 ? "-0.02em" : "0";
        return '<span style="margin-left:' + ml + '">' + ch + "</span>";
      }).join("");
    })();
  </script>
</body>
</html>
