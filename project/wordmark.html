<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NXTVC — Wordmark (transparent capture)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  .stage { display: inline-flex; padding: 60px; }
  .wm {
    font-family: 'Press Start 2P', monospace;
    font-size: 150px; line-height: 1; letter-spacing: 0.05em; padding-left: 0.05em;
    color: #3A2350;
    text-shadow: 9px 9px 0 #FF9F45, 18px 18px 0 #9B6BFF;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="stage"><span class="wm" id="wm">NXTVC</span></div>
</body>
</html>
